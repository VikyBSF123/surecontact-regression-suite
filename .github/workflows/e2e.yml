name: E2E Tests

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main]

# Cancel in-flight runs for the same branch/PR on new pushes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Sharded test execution (4 shards → ≤15 min wall-clock) ─────────────────
  e2e:
    name: "E2E · Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false   # don't cancel other shards when one fails
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CI only installs Chromium to keep install time under 90 s
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          npx playwright test \
            --project=chromium \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: "true"
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://qaing.surecontact.com' }}
          API_BASE_URL: ${{ secrets.E2E_API_BASE_URL || 'https://api-qaing.surecontact.com' }}
          TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          MAILPIT_URL: ${{ secrets.E2E_MAILPIT_URL || 'http://localhost:8025' }}

      # Upload traces + screenshots on failure so developers can inspect them
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-shard-${{ matrix.shardIndex }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      # Always upload the blob report so merge-reports can combine shards
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-shard-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

  # ── Merge sharded blob reports into one HTML report ─────────────────────────
  merge-reports:
    name: "Merge E2E Reports"
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-shard-*
          merge-multiple: true
          path: all-blob-reports/

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports/

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
